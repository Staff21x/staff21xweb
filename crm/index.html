<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Staff21x</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; color: #333; }

        header {
            background: #0f4c81;
            color: white;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        header h1 { font-size: 1.4rem; letter-spacing: 0.5px; }

        .tabs {
            display: flex;
            background: #0d3f6e;
            padding: 0 28px;
        }
        .tab {
            padding: 11px 26px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            font-size: 0.88rem;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            user-select: none;
        }
        .tab:hover { color: white; }
        .tab.active { color: white; border-bottom-color: #4fc3f7; }

        .content { padding: 28px; max-width: 1150px; margin: 0 auto; }
        .panel { display: none; }
        .panel.active { display: block; }

        .card {
            background: white;
            border-radius: 10px;
            padding: 28px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }
        .card h2 { font-size: 1.05rem; color: #0f4c81; margin-bottom: 22px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }

        label { font-size: 0.82rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.4px; }
        input, textarea, select {
            padding: 10px 13px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            font-family: inherit;
            background: #fafafa;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0f4c81;
            background: white;
        }
        textarea { resize: vertical; min-height: 85px; }

        .btn {
            padding: 10px 26px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 700;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: #0f4c81; color: white; }
        .btn-primary:hover { background: #0d3f6e; }
        .btn-sm { padding: 5px 13px; font-size: 0.78rem; }
        .btn-email { background: #e3f2fd; color: #0f4c81; border: 1px solid #bbdefb; }
        .btn-email:hover { background: #bbdefb; }
        .btn-wa { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .btn-wa:hover { background: #c8e6c9; }
        .btn-cancel { background: #f5f5f5; color: #666; }
        .btn-cancel:hover { background: #e0e0e0; }

        .form-actions { margin-top: 22px; display: flex; gap: 12px; align-items: center; }
        .msg { font-size: 0.84rem; padding: 7px 14px; border-radius: 6px; }
        .msg-ok { background: #e8f5e9; color: #2e7d32; }
        .msg-err { background: #ffebee; color: #c62828; }

        /* Table */
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .search-box {
            padding: 9px 14px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            width: 270px;
            font-size: 0.88rem;
        }
        .search-box:focus { outline: none; border-color: #0f4c81; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th {
            background: #0f4c81;
            color: white;
            padding: 11px 13px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        td {
            padding: 10px 13px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }

        .badge {
            display: inline-block;
            padding: 3px 11px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge-pending { background: #fff8e1; color: #f57f17; }
        .badge-ok { background: #e8f5e9; color: #2e7d32; }
        .badge-no { background: #ffebee; color: #c62828; }

        .estado-select {
            border: none;
            cursor: pointer;
            font-size: 0.78rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-family: inherit;
            -webkit-appearance: none;
        }

        .actions { display: flex; gap: 6px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 520px;
            max-width: 95vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
        }
        .modal h3 { color: #0f4c81; margin-bottom: 20px; font-size: 1.05rem; }
        .modal .form-group { margin-bottom: 14px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; align-items: center; }

        .loading { color: #aaa; font-size: 0.9rem; text-align: center; padding: 48px; }
        .empty { color: #bbb; font-size: 0.9rem; text-align: center; padding: 48px; }

        .req-cell {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            .content { padding: 16px; }
            .form-grid { grid-template-columns: 1fr; }
            .table-header { flex-direction: column; gap: 12px; align-items: stretch; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    <h1>CRM &mdash; Staff21x</h1>
</header>

<div class="tabs">
    <div class="tab active" data-tab="nuevo" onclick="showTab('nuevo', this)">+ Nuevo Contacto</div>
    <div class="tab" data-tab="contactos" onclick="showTab('contactos', this)">Lista de Contactos</div>
</div>

<div class="content">

    <!-- PANEL: NUEVO CONTACTO -->
    <div class="panel active" id="panel-nuevo">
        <div class="card">
            <h2>Registrar Nuevo Contacto</h2>
            <form id="form-contacto" onsubmit="guardarContacto(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="nombre" required placeholder="Juan">
                    </div>
                    <div class="form-group">
                        <label>Apellido *</label>
                        <input type="text" id="apellido" required placeholder="Pérez">
                    </div>
                    <div class="form-group">
                        <label>Correo *</label>
                        <input type="email" id="correo" required placeholder="juan@correo.com">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="text" id="whatsapp" placeholder="+51 999 999 999">
                    </div>
                    <div class="form-group full">
                        <label>Requerimiento *</label>
                        <textarea id="requerimiento" required placeholder="Describe lo que necesita el cliente..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Cotización (S/. o USD)</label>
                        <input type="text" id="cotizacion" placeholder="1,500.00">
                    </div>
                    <div class="form-group">
                        <label>Estado inicial</label>
                        <select id="estado">
                            <option value="Pendiente">Pendiente</option>
                            <option value="Aceptado">Aceptado</option>
                            <option value="No Aceptado">No Aceptado</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-guardar">Guardar Contacto</button>
                    <span id="form-msg"></span>
                </div>
            </form>
        </div>
    </div>

    <!-- PANEL: CONTACTOS -->
    <div class="panel" id="panel-contactos">
        <div class="card">
            <div class="table-header">
                <h2 style="margin-bottom:0">Contactos Registrados</h2>
                <input type="text" class="search-box" placeholder="Buscar nombre, correo..." oninput="filtrar(this.value)">
            </div>
            <div class="table-wrap">
                <div id="tabla-container"><div class="loading">Cargando contactos...</div></div>
            </div>
        </div>
    </div>

</div>

<!-- MODAL: ENVIAR CORREO -->
<div class="modal-overlay" id="modal-email">
    <div class="modal">
        <h3>&#9993; Enviar Correo</h3>
        <div class="form-group">
            <label>Para</label>
            <input type="email" id="email-to" readonly style="background:#f5f5f5;color:#666">
        </div>
        <div class="form-group">
            <label>Asunto *</label>
            <input type="text" id="email-subject" placeholder="Ej: Cotización de servicios Staff21x">
        </div>
        <div class="form-group">
            <label>Mensaje *</label>
            <textarea id="email-body" style="min-height:150px" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="enviarCorreo()">Enviar</button>
            <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
            <span id="email-msg"></span>
        </div>
    </div>
</div>

<script>
// ================================================
// CONFIGURACIÓN — reemplaza con tu URL de Apps Script
// ================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1Amk5leyqyk-OKm9Uo4ME8AbcNmojRCcIpoUXlQ8GDEv3NJ_xbe8wdr1lIgntHZMV/exec';
// ================================================

let todosContactos = [];

function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'contactos') cargarContactos();
}

// ---- GUARDAR CONTACTO ----
async function guardarContacto(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-guardar');
    const msg = document.getElementById('form-msg');
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    msg.innerHTML = '';

    const datos = {
        action: 'addContact',
        nombre: document.getElementById('nombre').value.trim(),
        apellido: document.getElementById('apellido').value.trim(),
        correo: document.getElementById('correo').value.trim(),
        whatsapp: document.getElementById('whatsapp').value.trim(),
        requerimiento: document.getElementById('requerimiento').value.trim(),
        cotizacion: document.getElementById('cotizacion').value.trim(),
        estado: document.getElementById('estado').value
    };

    try {
        const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(datos)
        });
        const json = await res.json();
        if (json.success) {
            msg.innerHTML = '<span class="msg msg-ok">&#10003; Contacto guardado correctamente.</span>';
            e.target.reset();
        } else {
            throw new Error();
        }
    } catch {
        msg.innerHTML = '<span class="msg msg-err">&#10007; Error al guardar. Verifica la URL del script.</span>';
    }

    btn.disabled = false;
    btn.textContent = 'Guardar Contacto';
}

// ---- CARGAR CONTACTOS ----
async function cargarContactos() {
    const container = document.getElementById('tabla-container');
    container.innerHTML = '<div class="loading">Cargando...</div>';
    try {
        const res = await fetch(SCRIPT_URL + '?action=getContacts');
        const json = await res.json();
        todosContactos = (json.contacts || []).reverse();
        renderTabla(todosContactos);
    } catch {
        container.innerHTML = '<div class="empty">Error al cargar. Verifica la URL del script.</div>';
    }
}

function renderTabla(contactos) {
    const container = document.getElementById('tabla-container');
    if (!contactos.length) {
        container.innerHTML = '<div class="empty">No hay contactos registrados aún.</div>';
        return;
    }

    const rows = contactos.map(c => {
        const badgeClass = c.estado === 'Aceptado' ? 'badge-ok' :
                           c.estado === 'No Aceptado' ? 'badge-no' : 'badge-pending';
        const waBtnHtml = c.whatsapp
            ? `<a href="https://wa.me/${c.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" class="btn btn-sm btn-wa">WhatsApp</a>`
            : '';

        return `<tr>
            <td>${c.fecha || ''}</td>
            <td><strong>${escHtml(c.nombre)} ${escHtml(c.apellido)}</strong></td>
            <td>${escHtml(c.correo)}</td>
            <td>${escHtml(c.whatsapp || '-')}</td>
            <td class="req-cell" title="${escAttr(c.requerimiento)}">${escHtml(c.requerimiento || '')}</td>
            <td>${escHtml(c.cotizacion || '-')}</td>
            <td>
                <select class="estado-select ${badgeClass}" onchange="cambiarEstado(${c.id}, this)">
                    <option ${c.estado==='Pendiente'?'selected':''}>Pendiente</option>
                    <option ${c.estado==='Aceptado'?'selected':''}>Aceptado</option>
                    <option ${c.estado==='No Aceptado'?'selected':''}>No Aceptado</option>
                </select>
            </td>
            <td>
                <div class="actions">
                    <button class="btn btn-sm btn-email" onclick="abrirEmail('${escAttr(c.correo)}','${escAttr(c.nombre)}')">Correo</button>
                    ${waBtnHtml}
                </div>
            </td>
        </tr>`;
    }).join('');

    container.innerHTML = `
        <table>
            <thead><tr>
                <th>Fecha</th><th>Nombre</th><th>Correo</th><th>WhatsApp</th>
                <th>Requerimiento</th><th>Cotización</th><th>Estado</th><th>Acciones</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function filtrar(q) {
    const t = q.toLowerCase();
    renderTabla(todosContactos.filter(c =>
        `${c.nombre} ${c.apellido} ${c.correo}`.toLowerCase().includes(t)
    ));
}

// ---- CAMBIAR ESTADO ----
async function cambiarEstado(rowId, sel) {
    const estado = sel.value;
    sel.className = `estado-select ${
        estado === 'Aceptado' ? 'badge-ok' :
        estado === 'No Aceptado' ? 'badge-no' : 'badge-pending'
    }`;
    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'updateStatus', rowId, estado })
    });
}

// ---- EMAIL ----
function abrirEmail(correo, nombre) {
    document.getElementById('email-to').value = correo;
    document.getElementById('email-subject').value = '';
    document.getElementById('email-body').value = `Hola ${nombre},\n\n`;
    document.getElementById('email-msg').innerHTML = '';
    document.getElementById('modal-email').classList.add('open');
}

function cerrarModal() {
    document.getElementById('modal-email').classList.remove('open');
}

async function enviarCorreo() {
    const msg = document.getElementById('email-msg');
    const datos = {
        action: 'sendEmail',
        to: document.getElementById('email-to').value,
        subject: document.getElementById('email-subject').value.trim(),
        body: document.getElementById('email-body').value.trim()
    };
    if (!datos.subject || !datos.body) {
        msg.innerHTML = '<span class="msg msg-err">Completa asunto y mensaje.</span>';
        return;
    }
    msg.innerHTML = '<span style="color:#888;font-size:0.84rem">Enviando...</span>';
    try {
        const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(datos)
        });
        const json = await res.json();
        if (json.success) {
            msg.innerHTML = '<span class="msg msg-ok">&#10003; Correo enviado.</span>';
            setTimeout(cerrarModal, 1800);
        } else throw new Error();
    } catch {
        msg.innerHTML = '<span class="msg msg-err">&#10007; Error al enviar.</span>';
    }
}

// Helpers XSS-safe
function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
    return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Cerrar modal al hacer click fuera
document.getElementById('modal-email').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
});
</script>
</body>
</html>
